<svg xmlns="http://www.w3.org/2000/svg" width="900" height="60" viewBox="0 0 900 60">
  <defs>
    <filter id="glow-g" x="-50%" y="-200%" width="200%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-b" x="-50%" y="-200%" width="200%" height="500%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="3" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="8" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="lg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#00ff88" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#00ff88" stop-opacity="1"/>
      <stop offset="75%"  stop-color="#00e5ff" stop-opacity="1"/>
      <stop offset="100%" stop-color="#00e5ff" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="900" height="60" fill="#0d1117"/>

  <rect x="50" y="2" width="800" height="1.5" fill="url(#lg)" opacity="0.85"/>

  <text x="450" y="38" text-anchor="middle" font-family="'Courier New',monospace" font-size="13" letter-spacing="1.5">
    <tspan fill="#00ff88" filter="url(#glow-g)">Built with Baileys</tspan>
    <tspan fill="#444">  ·  </tspan>
    <tspan fill="#00e5ff" filter="url(#glow-b)">Do not remove credits</tspan>
    <tspan fill="#444">  ·  </tspan>
    <tspan fill="#00ff88" filter="url(#glow-g)">MIT © 2025 NEXUS-MD</tspan>
  </text>

  <rect x="50" y="57" width="800" height="1.5" fill="url(#lg)" opacity="0.85"/>
</svg>
